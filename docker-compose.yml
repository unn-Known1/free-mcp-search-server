version: '3.8'

services:
  mcp-search:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_PORT=8080
      - MAX_RESULTS=20
      - CACHE_TTL=300
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
